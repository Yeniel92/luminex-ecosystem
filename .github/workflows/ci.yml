name: Luminex CI

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar archivos clave
        run: |
          test -f index.html || (echo "Falta index.html" && exit 1)
          test -f netlify.toml || (echo "Falta netlify.toml" && exit 1)
          test -f _headers || (echo "Falta _headers" && exit 1)
