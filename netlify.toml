[build]
  publish = "."

[[redirects]]
  from = "/sales/app"
  to = "/sales/app/luminex-sales.html"
  status = 200

[[redirects]]
  from = "/sales/app/"
  to = "/sales/app/luminex-sales.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
